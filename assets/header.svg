<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="100%">
  <defs>
    <!-- Background Radial Glow -->
    <radialGradient id="nebula-glow" cx="70%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Keyframe Animations -->
    <style>
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-6px) rotate(3deg); }
      }
      @keyframes float-medium {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
      @keyframes dash-scroll {
        to { stroke-dashoffset: -20; }
      }
      .floating-art {
        transform-origin: 650px 130px;
        animation: float-slow 8s ease-in-out infinite;
      }
      .glowing-core {
        transform-origin: 650px 130px;
        animation: pulse-glow 4s ease-in-out infinite;
      }
      .flow-line {
        stroke-dasharray: 4, 4;
        animation: dash-scroll 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="850" height="260" rx="16" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
  <rect width="850" height="260" rx="16" fill="url(#nebula-glow)"/>

  <!-- Background Grid -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <line x1="40" y1="0" x2="40" y2="260"/>
    <line x1="120" y1="0" x2="120" y2="260"/>
    <line x1="200" y1="0" x2="200" y2="260"/>
    <line x1="280" y1="0" x2="280" y2="260"/>
    <line x1="360" y1="0" x2="360" y2="260"/>
    <line x1="440" y1="0" x2="440" y2="260"/>
    <line x1="520" y1="0" x2="520" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="680" y1="0" x2="680" y2="260"/>
    <line x1="760" y1="0" x2="760" y2="260"/>
    <line x1="0" y1="65" x2="850" y2="65"/>
    <line x1="0" y1="130" x2="850" y2="130"/>
    <line x1="0" y1="195" x2="850" y2="195"/>
  </g>

  <!-- LEFT COLUMN: Typography & Brand -->
  <g transform="translate(60, 80)">
    <!-- Subtitle (Category) -->
    <text x="0" y="10" fill="url(#accent-grad)" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="11" letter-spacing="3">SYSTEMS ARCHITECT &amp; PLATFORM ENGINEER</text>
    
    <!-- Title Name -->
    <text x="0" y="60" fill="url(#text-grad)" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="44" letter-spacing="-1">Ganesh Rai</text>
    
    <!-- Tagline / Value Prop -->
    <text x="0" y="98" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="14">Designing resilient cloud-scale runtime environments,</text>
    <text x="0" y="118" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14">high-throughput event pipelines, and distributed cache fabrics.</text>

    <!-- Inline Status Indicator Badge -->
    <g transform="translate(0, 142)">
      <rect width="90" height="20" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <circle cx="12" cy="10" r="3" fill="#10b981" />
      <text x="24" y="14" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="9" letter-spacing="0.5">ACTIVE NODE</text>
    </g>
  </g>

  <!-- RIGHT COLUMN: Elegant Abstract Orbital Art -->
  <g class="floating-art">
    <!-- Outer Orbital Ring -->
    <circle cx="650" cy="130" r="65" fill="none" stroke="#27272a" stroke-width="1" />
    <circle cx="650" cy="130" r="65" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-dasharray="10 120" class="flow-line" />
    
    <!-- Inner Orbital Ring -->
    <circle cx="650" cy="130" r="40" fill="none" stroke="#27272a" stroke-width="1" stroke-dasharray="3 3" />
    
    <!-- Node Connections (Clean geometric line work) -->
    <line x1="650" y1="65" x2="650" y2="195" stroke="#27272a" stroke-width="1" />
    <line x1="585" y1="130" x2="715" y2="130" stroke="#27272a" stroke-width="1" />
    <line x1="604" y1="84" x2="696" y2="176" stroke="#27272a" stroke-width="1" stroke-opacity="0.5" />
    <line x1="604" y1="176" x2="696" y2="84" stroke="#27272a" stroke-width="1" stroke-opacity="0.5" />

    <!-- Glowing Core Spheres -->
    <circle cx="650" cy="130" r="14" fill="url(#accent-grad)" class="glowing-core" />
    <circle cx="650" cy="130" r="8" fill="#ffffff" />

    <!-- Floating Outer Nodes -->
    <circle cx="650" cy="65" r="4.5" fill="#38bdf8" />
    <circle cx="715" cy="130" r="5" fill="#6366f1" />
    <circle cx="650" cy="195" r="4" fill="#38bdf8" />
    <circle cx="585" cy="130" r="5" fill="#10b981" />
    
    <circle cx="696" cy="176" r="3" fill="#a1a1aa" />
    <circle cx="604" cy="84" r="3" fill="#a1a1aa" />
  </g>
</svg>
