<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1329"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Styles and Keyframe Animations -->
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes typed-line-1 {
        0% { clip-path: inset(0 100% 0 0); }
        30%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes typed-line-2 {
        0%, 30% { clip-path: inset(0 100% 0 0); }
        60%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes typed-line-3 {
        0%, 60% { clip-path: inset(0 100% 0 0); }
        90%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes progress-pulse {
        0%, 100% { stroke-dashoffset: 80; }
        50% { stroke-dashoffset: 45; }
      }
      @keyframes node-flash {
        0%, 100% { fill: #10b981; filter: drop-shadow(0 0 2px #10b981); }
        50% { fill: #059669; filter: none; }
      }

      .terminal-frame {
        stroke: url(#glow-grad);
        stroke-width: 1.5;
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      .line-1 {
        animation: typed-line-1 4s steps(40) infinite;
      }
      .line-2 {
        animation: typed-line-2 4s steps(40) infinite;
      }
      .line-3 {
        animation: typed-line-3 4s steps(40) infinite;
      }
      .gauge-ring {
        transform-origin: 730px 150px;
        animation: spin 20s linear infinite;
      }
      .gauge-indicator {
        stroke-dasharray: 220;
        animation: progress-pulse 4s ease-in-out infinite;
      }
      .status-dot {
        animation: node-flash 2s infinite;
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="850" height="300" rx="12" fill="url(#panel-grad)" class="terminal-frame"/>

  <!-- Terminal Window Chrome Header -->
  <path d="M 1.5 35 L 848.5 35" stroke="#1e293b" stroke-width="1.5" />
  <circle cx="20" cy="18" r="5" fill="#ef4444" /> <!-- Red close -->
  <circle cx="36" cy="18" r="5" fill="#eab308" /> <!-- Yellow minimize -->
  <circle cx="52" cy="18" r="5" fill="#22c55e" /> <!-- Green expand -->
  
  <text x="425" y="22" fill="#64748b" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">gaxrai@engine-node-01:~</text>

  <!-- Live Status Light Indicator -->
  <g transform="translate(790, 10)">
    <circle cx="10" cy="8" r="4.5" fill="#10b981" class="status-dot" />
    <text x="20" y="11" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold">ONLINE</text>
  </g>

  <!-- LEFT COLUMN: Terminal System Logs -->
  <g transform="translate(30, 60)" font-family="monospace" font-size="12">
    <!-- Static Console Shell Prompt -->
    <text x="0" y="20" fill="#a855f7" font-weight="bold">gaxrai-core$</text>
    <text x="100" y="20" fill="#cbd5e1">./boot_diagnostics.sh</text>

    <!-- Line 1 Output -->
    <g class="line-1">
      <text x="0" y="50" fill="#64748b">[OK]</text>
      <text x="45" y="50" fill="#cbd5e1">Consensus check. Distributed replica cluster active.</text>
    </g>

    <!-- Line 2 Output -->
    <g class="line-2">
      <text x="0" y="75" fill="#3b82f6">[INFO]</text>
      <text x="55" y="75" fill="#cbd5e1">JVM low-latency ZGC thread configuration optimized.</text>
    </g>

    <!-- Line 3 Output -->
    <g class="line-3">
      <text x="0" y="100" fill="#10b981">[SYS]</text>
      <text x="45" y="100" fill="#cbd5e1">Caffeine L1 Cache (p99 &lt; 200ms) &amp; Redis L2 cached.</text>
    </g>
  </g>

  <!-- CENTER DIVIDER -->
  <path d="M 540 60 L 540 260" stroke="#1e293b" stroke-dasharray="4 4" />

  <!-- RIGHT COLUMN: System Gauges & Core Metrics -->
  <g transform="translate(560, 60)">
    <!-- Section Header -->
    <text x="10" y="15" fill="#64748b" font-family="monospace" font-size="10" font-weight="bold">TELEMETRY MONITOR</text>

    <!-- Circular Load Gauge -->
    <!-- Center coordinate for gauge is x=170, y=90 in local space -> global: x=730, y=150 -->
    <circle cx="170" cy="90" r="50" fill="none" stroke="#1e293b" stroke-width="6" />
    <circle cx="170" cy="90" r="50" fill="none" stroke="url(#glow-grad)" stroke-width="6" 
            stroke-linecap="round" class="gauge-indicator" />
    <circle cx="170" cy="90" r="42" fill="#070a13" />

    <!-- Ingress Load Percentage Text -->
    <text x="170" y="86" fill="#cbd5e1" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">94.2%</text>
    <text x="170" y="102" fill="#64748b" font-family="monospace" font-size="8" text-anchor="middle">INGRESS LOAD</text>

    <!-- Dynamic Specs -->
    <g font-family="monospace" font-size="11" fill="#cbd5e1" transform="translate(10, 45)">
      <!-- Metric 1 -->
      <text x="0" y="20" fill="#64748b">PLATFORM:</text>
      <text x="75" y="20" fill="#c084fc" font-weight="bold">CORE ARCHITECT</text>

      <!-- Metric 2 -->
      <text x="0" y="45" fill="#64748b">LATENCY:</text>
      <text x="75" y="45" fill="#3b82f6" font-weight="bold">-35% OPTIMIZED</text>

      <!-- Metric 3 -->
      <text x="0" y="70" fill="#64748b">UPTIME:</text>
      <text x="75" y="70" fill="#10b981" font-weight="bold">4y 2mo (STABLE)</text>

      <!-- Metric 4 -->
      <text x="0" y="95" fill="#64748b">DAEMON:</text>
      <text x="75" y="95" fill="#f97316" font-weight="bold">java-17-zgc</text>
    </g>
  </g>

  <!-- CLI Prompt at bottom left -->
  <g transform="translate(30, 260)" font-family="monospace" font-size="12">
    <text x="0" y="0" fill="#a855f7" font-weight="bold">gaxrai-core$</text>
    <text x="100" y="0" fill="#cbd5e1" font-weight="bold">systemctl status gaxrai-core</text>
    <rect x="365" y="-11" width="8" height="13" fill="#cbd5e1" class="cursor" />
  </g>
</svg>
