  <!-- Left Status Text -->
  <text x="12" y="16" fill="#c084fc" font-family="monospace" font-weight="bold" font-size="10">SYS.LOG_ACTIVE</text>
  
  <!-- Divider Line -->
  <line x1="120" y1="12" x2="710" y2="12" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4" />
  
