<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="50%" stop-color="#0b1329"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>

    <!-- Node Glow Filters (optimized and compatible) -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients for Connections -->
    <linearGradient id="grad-blue-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="grad-purple-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="grad-green-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c084fc"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981"/>
    </marker>

    <!-- Animations -->
    <style>
      @keyframes dash {
        to {
          stroke-dashoffset: -40;
        }
      }
      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
        100% { transform: translateY(0px); }
      }
      .flow-path {
        stroke-dasharray: 8, 8;
        animation: dash 2s linear infinite;
      }
      .flow-path-fast {
        stroke-dasharray: 6, 6;
        animation: dash 1.2s linear infinite;
      }
      .node-pulse {
        animation: pulse 3s ease-in-out infinite;
      }
      .floating-group {
        animation: float 6s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Canvas Background -->
  <rect width="900" height="340" rx="16" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Grid lines for engineering layout aesthetic -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="340"/>
    <line x1="220" y1="0" x2="220" y2="340"/>
    <line x1="440" y1="0" x2="440" y2="340"/>
    <line x1="660" y1="0" x2="660" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="170" x2="900" y2="170"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
  </g>

  <!-- Flow Links (Connections) -->
  <!-- Ingress to Kafka -->
  <path d="M 170 170 H 250" fill="none" stroke="url(#grad-blue-purple)" stroke-width="2.5" class="flow-path-fast" marker-end="url(#arrow-blue)"/>
  
  <!-- Kafka to Spring Boot (App Engine) -->
  <path d="M 370 170 H 430" fill="none" stroke="url(#grad-blue-purple)" stroke-width="2.5" class="flow-path" marker-end="url(#arrow-purple)"/>

  <!-- Spring Boot to Caffeine/Redis Cache -->
  <path d="M 550 145 Q 600 110 650 110" fill="none" stroke="url(#grad-purple-green)" stroke-width="2" class="flow-path" marker-end="url(#arrow-purple)"/>
  
  <!-- Cache Write-Back / Read-Miss Flow -->
  <path d="M 650 130 Q 600 140 550 155" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4, 4" marker-end="url(#arrow-green)"/>
  
  <!-- Spring Boot to PostgreSQL -->
  <path d="M 550 185 Q 600 220 655 220" fill="none" stroke="url(#grad-purple-green)" stroke-width="2" class="flow-path" marker-end="url(#arrow-purple)"/>

  <!-- Caffeine/Redis to PostgreSQL (Cache Miss / Sync) -->
  <path d="M 715 145 Q 735 180 755 200" fill="none" stroke="url(#grad-green-orange)" stroke-width="1.5" stroke-dasharray="3, 3" marker-end="url(#arrow-green)"/>

  <!-- Observability Loop (APM Trace) -->
  <path d="M 490 125 V 60" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4, 4"/>
  <path d="M 310 125 V 45 H 430" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4, 4"/>

  <!-- ================= NODES ================= -->

  <!-- NODE 1: Ingress (IoT/Clients) -->
  <g transform="translate(50, 125)" class="floating-group">
    <rect width="120" height="90" rx="10" fill="#0b0f19" stroke="#3b82f6" stroke-width="2" filter="url(#glow-blue)" />
    <!-- Mini Terminal Header -->
    <rect width="120" height="18" rx="4" fill="#0f172a" />
    <circle cx="10" cy="9" r="3" fill="#ef4444" />
    <circle cx="18" cy="9" r="3" fill="#eab308" />
    <circle cx="26" cy="9" r="3" fill="#22c55e" />
    
    <text x="60" y="45" fill="#3b82f6" font-family="monospace" font-weight="bold" font-size="12" text-anchor="middle">INGRESS FLOW</text>
    <text x="60" y="63" fill="#cbd5e1" font-family="monospace" font-size="10" text-anchor="middle">10K+ Req/sec</text>
    <text x="60" y="78" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">Clients / IoT Gateway</text>
  </g>

  <!-- NODE 2: Apache Kafka -->
  <g transform="translate(250, 125)">
    <rect width="120" height="90" rx="10" fill="#0b0f19" stroke="#a855f7" stroke-width="2" filter="url(#glow-purple)" />
    <!-- Mini Terminal Header -->
    <rect width="120" height="18" rx="4" fill="#0f172a" />
    <text x="60" y="13" fill="#a855f7" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">EVENT BROKER</text>

    <text x="60" y="45" fill="#d8b4fe" font-family="monospace" font-weight="bold" font-size="13" text-anchor="middle">KAFKA</text>
    <text x="60" y="63" fill="#cbd5e1" font-family="monospace" font-size="10" text-anchor="middle">Partition-Aware</text>
    <text x="60" y="78" fill="#a855f7" font-family="monospace" font-size="9" text-anchor="middle">Kafka Consensus</text>
    <circle cx="110" cy="12" r="3" fill="#22c55e" class="node-pulse" />
  </g>

  <!-- NODE 3: Spring Boot App Engine -->
  <g transform="translate(430, 125)">
    <rect width="120" height="90" rx="10" fill="#0b0f19" stroke="#c084fc" stroke-width="2" filter="url(#glow-purple)" />
    <!-- Mini Terminal Header -->
    <rect width="120" height="18" rx="4" fill="#0f172a" />
    <text x="60" y="13" fill="#c084fc" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">ENGINE DAEMON</text>

    <text x="60" y="43" fill="#e9d5ff" font-family="monospace" font-weight="bold" font-size="12" text-anchor="middle">SPRING BOOT</text>
    <text x="60" y="61" fill="#cbd5e1" font-family="monospace" font-size="10" text-anchor="middle">JVM 17 / ZGC</text>
    <text x="60" y="78" fill="#10b981" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">Throughput +40%</text>
    <circle cx="110" cy="12" r="3" fill="#22c55e" class="node-pulse" />
  </g>

  <!-- NODE 4: Caching Layer (Caffeine + Redis) -->
  <g transform="translate(650, 65)" class="floating-group">
    <rect width="130" height="80" rx="10" fill="#0b0f19" stroke="#10b981" stroke-width="2" filter="url(#glow-green)" />
    <!-- Mini Terminal Header -->
    <rect width="130" height="18" rx="4" fill="#0f172a" />
    <text x="65" y="13" fill="#10b981" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">L1/L2 CACHE</text>

    <text x="65" y="40" fill="#6ee7b7" font-family="monospace" font-weight="bold" font-size="11" text-anchor="middle">REDIS &amp; CAFFEINE</text>
    <text x="65" y="56" fill="#cbd5e1" font-family="monospace" font-size="9" text-anchor="middle">p99 &lt; 200ms Ingress</text>
    <text x="65" y="70" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">Cache Reads -60%</text>
  </g>

  <!-- NODE 5: PostgreSQL Database -->
  <g transform="translate(650, 185)">
    <rect width="130" height="80" rx="10" fill="#0b0f19" stroke="#f97316" stroke-width="2" filter="url(#glow-orange)" />
    <!-- Mini Terminal Header -->
    <rect width="130" height="18" rx="4" fill="#0f172a" />
    <text x="65" y="13" fill="#f97316" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">STORAGE LEDGER</text>

    <text x="65" y="40" fill="#ffedd5" font-family="monospace" font-weight="bold" font-size="12" text-anchor="middle">POSTGRESQL</text>
    <text x="65" y="56" fill="#cbd5e1" font-family="monospace" font-size="9" text-anchor="middle">Relational Core</text>
    <text x="65" y="70" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">ACID Ledger Sync</text>
  </g>

  <!-- TOP BLOCK: Monitoring / Telemetry -->
  <g transform="translate(430, 25)">
    <rect width="120" height="26" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="60" y="17" fill="#cbd5e1" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">DATADOG APM</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 295)">
    <rect width="800" height="30" rx="6" fill="#0f172a" opacity="0.8" stroke="#1e293b" stroke-width="1"/>
    
    <circle cx="20" cy="15" r="4" fill="#3b82f6"/>
    <text x="30" y="19" fill="#94a3b8" font-family="monospace" font-size="10">Ingress Pipeline</text>

    <circle cx="180" cy="15" r="4" fill="#a855f7"/>
    <text x="190" y="19" fill="#94a3b8" font-family="monospace" font-size="10">Distributed Event Broker</text>

    <circle cx="390" cy="15" r="4" fill="#10b981"/>
    <text x="400" y="19" fill="#94a3b8" font-family="monospace" font-size="10">Dual-Layer Cache</text>

    <circle cx="560" cy="15" r="4" fill="#f97316"/>
    <text x="570" y="19" fill="#94a3b8" font-family="monospace" font-size="10">RDBMS Storage</text>
    
    <circle cx="710" cy="15" r="4" fill="#64748b"/>
    <text x="720" y="19" fill="#94a3b8" font-family="monospace" font-size="10">Observability</text>
  </g>
</svg>
