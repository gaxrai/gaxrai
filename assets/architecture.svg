<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" height="100%">
  <defs>
    <!-- Card Gradients -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>

    <!-- Path Gradients -->
    <linearGradient id="path-blue-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    
    <linearGradient id="path-purple-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes dash-flow {
        to { stroke-dashoffset: -30; }
      }
      @keyframes soft-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .conn-line {
        stroke-dasharray: 6, 6;
        animation: dash-flow 1.5s linear infinite;
      }
      .pulsing-dot {
        animation: soft-pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Canvas Background -->
  <rect width="900" height="240" rx="16" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>

  <!-- FLOW PATHS (Curved Connections) -->
  <!-- Ingress Gateway -> Event Bus (Bezier curve) -->
  <path d="M 180 120 C 220 120, 220 120, 260 120" fill="none" stroke="url(#path-blue-purple)" stroke-width="2" class="conn-line" />
  
  <!-- Event Bus -> JVM App Engine -->
  <path d="M 380 120 C 410 120, 410 120, 440 120" fill="none" stroke="url(#path-blue-purple)" stroke-width="2" class="conn-line" />

  <!-- App Engine -> Caching Engine (Upper Branch) -->
  <path d="M 560 110 C 600 80, 610 80, 650 80" fill="none" stroke="url(#path-purple-green)" stroke-width="2" class="conn-line" />
  
  <!-- App Engine -> Persistent DB (Lower Branch) -->
  <path d="M 560 130 C 600 160, 610 160, 650 160" fill="none" stroke="url(#path-purple-green)" stroke-width="2" class="conn-line" stroke-dashoffset="15" />

  <!-- Cache Sync/Miss Feedback Loop -->
  <path d="M 770 80 C 810 80, 810 160, 770 160" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3, 5" />


  <!-- ================= NODES ================= -->

  <!-- NODE 1: Ingress (Clients / API Gateway) -->
  <g transform="translate(40, 75)">
    <rect width="140" height="90" rx="12" fill="url(#card-grad)" stroke="#27272a" stroke-width="1.5" />
    <text x="70" y="32" fill="#38bdf8" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" letter-spacing="1" text-anchor="middle">INGRESS EDGE</text>
    <text x="70" y="52" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="13" text-anchor="middle">10K+ Req/sec</text>
    <text x="70" y="70" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">High-Concurrency API</text>
    <circle cx="15" cy="15" r="3" fill="#38bdf8" class="pulsing-dot" />
  </g>

  <!-- NODE 2: Event Bus (Kafka partition stream) -->
  <g transform="translate(260, 75)">
    <rect width="120" height="90" rx="12" fill="url(#card-grad)" stroke="#27272a" stroke-width="1.5" />
    <text x="60" y="32" fill="#a855f7" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" letter-spacing="1" text-anchor="middle">EVENT BUS</text>
    <text x="60" y="52" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" text-anchor="middle">Kafka</text>
    <text x="60" y="70" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Broker Consensus</text>
    <circle cx="15" cy="15" r="3" fill="#a855f7" class="pulsing-dot" />
  </g>

  <!-- NODE 3: Compute Engine (JVM Spring Boot App) -->
  <g transform="translate(440, 75)">
    <rect width="120" height="90" rx="12" fill="url(#card-grad)" stroke="#6366f1" stroke-width="1.5" filter="url(#subtle-glow)" />
    <text x="60" y="32" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" letter-spacing="1" text-anchor="middle">APP ENGINE</text>
    <text x="60" y="52" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" text-anchor="middle">Spring JVM</text>
    <text x="60" y="70" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="9" text-anchor="middle">ZGC LOW-LATENCY</text>
    <circle cx="15" cy="15" r="3" fill="#6366f1" class="pulsing-dot" />
  </g>

  <!-- NODE 4: In-Memory L1/L2 Cache (Caffeine + Redis) -->
  <g transform="translate(650, 40)">
    <rect width="120" height="70" rx="12" fill="url(#card-grad)" stroke="#27272a" stroke-width="1.5" />
    <text x="60" y="26" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="10" letter-spacing="1" text-anchor="middle">CACHE FABRIC</text>
    <text x="60" y="44" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Redis &amp; Caffeine</text>
    <text x="60" y="58" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">Reads: -60% DB Load</text>
  </g>

  <!-- NODE 5: Persistence Storage (Postgres ACID Ledger) -->
  <g transform="translate(650, 130)">
    <rect width="120" height="70" rx="12" fill="url(#card-grad)" stroke="#27272a" stroke-width="1.5" />
    <text x="60" y="26" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="10" letter-spacing="1" text-anchor="middle">PERSISTENCE</text>
    <text x="60" y="44" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" text-anchor="middle">PostgreSQL</text>
    <text x="60" y="58" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">ACID Transactions</text>
  </g>
</svg>
